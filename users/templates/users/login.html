{% load static %}

<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<div class="auth-container">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>

    <p>Don't have an account?
        <a href="/users/register/">Register</a>
    </p>
</div>
