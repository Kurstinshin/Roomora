{% load static %}

<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<div class="auth-wrapper">



    <div class="auth-container">

        <h2>Register</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                {{ form.username }}
                <small class="help">{{ form.username.help_text }}</small>
            </div>

            <div class="form-group">
                <label>Email</label>
                {{ form.email }}
            </div>

            <div class="form-group">
                <label>Password</label>
                {{ form.password1 }}
                <small class="help">{{ form.password1.help_text }}</small>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                {{ form.password2 }}
                <small class="help">{{ form.password2.help_text }}</small>
            </div>

            <button type="submit">Register</button>
        </form>

        <p>
            Already have an account?
            <a href="/users/login/">Login</a>
        </p>

    </div>

</div>
