<div class="interface-card">
    <h3 class="interface-title">Send Inquiry</h3>

        {% csrf_token %}
        <label for="id_message">Message</label>
        {{ inquiry_form.message }}
        <button type="submit" class="interface-btn">Send Inquiry</button>
    </form>
</div>
